<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#182018" />
    <link rel="icon" href="data:," />
    <title>蟻の群れリアクションラボ 3D</title>
  </head>
  <body>
    <div id="loading-screen" class="loading-screen">
      <div class="loading-card">
        <div class="loading-title">蟻の群れリアクションラボ 3D</div>
        <div id="loading-progress" class="loading-progress">0%</div>
        <div class="loading-bar"><span id="loading-bar-fill"></span></div>
      </div>
    </div>
    <div id="error-screen" class="error-screen" hidden>
      <div class="error-card">
        <h1>WebGL が必要です</h1>
        <p>
          このゲームは Three.js の WebGL 描画を使用します。ブラウザまたは端末の
          WebGL 設定、ハードウェアアクセラレーション、低電力モードを確認してください。
        </p>
      </div>
    </div>
    <canvas id="game-canvas" aria-label="3D ant colony field"></canvas>
    <div id="app-ui" data-ui>
      <header class="top-panel" data-ui>
        <div class="brand">
          <span class="brand-mark"></span>
          <span>蟻の群れリアクションラボ 3D</span>
        </div>
        <div id="stats-grid" class="stats-grid"></div>
      </header>
      <main class="colony-panel" data-ui>
        <div class="tab-row" role="tablist" aria-label="Colony tabs">
          <button class="tab-button is-active" data-tab="growth" type="button">成長</button>
          <button class="tab-button" data-tab="upgrade" type="button">強化</button>
          <button class="tab-button" data-tab="expedition" type="button">遠征</button>
        </div>
        <section id="tab-content" class="tab-content"></section>
      </main>
      <nav id="tool-bar" class="tool-bar" aria-label="tools" data-ui></nav>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
