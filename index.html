<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>antEX - アリの巣大帝国 3D</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <div id="world3d" aria-label="アリの巣大帝国の3Dマップ"></div>

      <div id="loadingOverlay" class="loading-overlay" role="status" aria-live="polite">
        <div class="loading-box">
          <strong>Loading</strong>
          <span id="loadingLabel">renderer</span>
          <div class="loading-track" aria-hidden="true">
            <span id="loadingBar"></span>
          </div>
        </div>
      </div>

      <div id="errorPanel" class="error-panel" role="alert" hidden>
        <strong>WebGL error</strong>
        <span id="errorMessage">This device cannot start the 3D renderer.</span>
      </div>

      <aside id="debugPanel" class="debug-panel" aria-label="debug metrics" hidden>
        <div class="debug-row">
          <span>quality</span>
          <select id="qualitySelect">
            <option value="low">low</option>
            <option value="medium">medium</option>
            <option value="high">high</option>
          </select>
        </div>
        <pre id="debugMetrics">waiting</pre>
      </aside>

      <header class="topbar">
        <div class="title-block">
          <span class="title-mark" aria-hidden="true"></span>
          <div>
            <strong>アントックス</strong>
            <small id="activeToolLabel">小さな巣から大帝国へ</small>
          </div>
        </div>
        <div class="quick-actions">
          <button id="pauseBtn" class="icon-button" type="button" title="一時停止" aria-label="一時停止">
            <span class="pause-icon" aria-hidden="true"></span>
          </button>
          <button id="resetBtn" class="icon-button" type="button" title="リセット" aria-label="リセット">
            <span class="reset-icon" aria-hidden="true"></span>
          </button>
        </div>
      </header>

      <div id="raidNotice" class="raid-notice" role="status" aria-live="polite" hidden></div>

      <section class="stats-strip" aria-label="コロニー資源">
        <div>
          <span>食料</span>
          <strong id="statFood">0</strong>
        </div>
        <div>
          <span>アリ</span>
          <strong id="statAnts">0/0</strong>
        </div>
        <div>
          <span>採餌力</span>
          <strong id="statFoodRate">0</strong>
        </div>
        <div>
          <span>領土</span>
          <strong id="statTerritory">0</strong>
        </div>
      </section>

      <section id="empirePanel" class="empire-panel" aria-label="アリ帝国管理">
        <button id="panelGrip" class="panel-grip" type="button" aria-label="管理パネルを小さくする" aria-expanded="true">
          <span aria-hidden="true"></span>
        </button>
        <div class="panel-header">
          <div>
            <strong>巣の成長</strong>
            <span id="colonySummary">巣Lv1 / 働きアリ 0 / 兵隊 0</span>
          </div>
          <div class="growth-meter" aria-label="孵化進行">
            <span id="growthFill"></span>
          </div>
        </div>

        <div class="metric-grid">
          <div>
            <span>巣Lv</span>
            <strong id="statNestLevel">1</strong>
          </div>
          <div>
            <span>収容上限</span>
            <strong id="statCapacity">0</strong>
          </div>
          <div>
            <span>兵隊</span>
            <strong id="statSoldiers">0</strong>
          </div>
          <div>
            <span>負傷</span>
            <strong id="statWounded">0</strong>
          </div>
          <div>
            <span>増加/分</span>
            <strong id="statGrowthRate">0</strong>
          </div>
          <div>
            <span>敵脅威</span>
            <strong id="statThreat">0</strong>
          </div>
        </div>

        <div class="panel-tabs" role="tablist" aria-label="管理タブ">
          <button class="tab-button active" type="button" data-tab="growth">成長</button>
          <button class="tab-button" type="button" data-tab="construction">土木</button>
          <button class="tab-button" type="button" data-tab="soldiers">兵隊</button>
        </div>

        <div id="growthTab" class="tab-panel active">
          <div id="upgradeList" class="upgrade-list"></div>
        </div>

        <div id="constructionTab" class="tab-panel">
          <div class="construction-grid">
            <div>
              <span>土木アリ</span>
              <strong id="constructionBuilders">0</strong>
            </div>
            <div>
              <span>作業中</span>
              <strong id="constructionActive">0</strong>
            </div>
            <div>
              <span>完成</span>
              <strong id="constructionComplete">0</strong>
            </div>
          </div>
          <div class="construction-actions">
            <button id="constructionTrailBtn" class="primary-button construction-command" type="button">
              <span class="button-main">採餌道を整える</span>
              <span class="button-sub">採土・往復あり / 移動・採餌効率↑</span>
            </button>
            <button id="constructionBarricadeBtn" class="primary-button construction-command" type="button">
              <span class="button-main">低い土塁を築く</span>
              <span class="button-sub">採土・往復あり / 敵減速・踏ん張り↑</span>
            </button>
          </div>
          <div id="constructionStatus" class="construction-status">待機</div>
          <div id="constructionCrew" class="construction-crew">待機 0</div>
          <div id="constructionProgressList" class="construction-progress-list"></div>
        </div>

        <div id="soldierTab" class="tab-panel">
          <div class="soldier-grid">
            <div>
              <span>巣内兵隊</span>
              <strong id="soldierNest">0</strong>
            </div>
            <div>
              <span>出撃中</span>
              <strong id="soldierDeployed">0</strong>
            </div>
            <div>
              <span>状態</span>
              <strong id="soldierStatus">待機</strong>
            </div>
          </div>
          <button id="soldierSortieBtn" class="primary-button" type="button">兵隊を出撃</button>
          <div id="battleLog" class="battle-log"></div>
        </div>
      </section>
    </main>

    <script type="module" src="./src/simulation.ts"></script>
  </body>
</html>
